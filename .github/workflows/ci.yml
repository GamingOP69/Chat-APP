name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: chat_app
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d chat_app"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      NODE_ENV: test
      PORT: 3000
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_DB: chat_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      SOCKET_IO_CORS_ORIGIN: http://127.0.0.1:3000
      JWT_SECRET: ci-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Wait for PostgreSQL
        run: |
          node <<'NODE'
          const { Client } = require('pg');

          const client = new Client({
            host: '127.0.0.1',
            port: 5432,
            user: 'postgres',
            password: 'postgres',
            database: 'chat_app',
          });

          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

          (async () => {
            for (let attempt = 1; attempt <= 30; attempt += 1) {
              try {
                await client.connect();
                await client.query('SELECT 1');
                await client.end();
                process.exit(0);
              } catch (error) {
                try {
                  await client.end();
                } catch (endError) {
                  void endError;
                }
                if (attempt === 30) {
                  console.error(error);
                  process.exit(1);
                }
                await sleep(2000);
              }
            }
          })();
          NODE
