version: '3.9'
services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-chat_app}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--save', '""', '--appendonly', 'no']
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ping']
      interval: 10s
      timeout: 5s
      retries: 5

  coturn:
    image: instrumentisto/coturn:4.5.2
    restart: unless-stopped
    environment:
      - TURN_PORT=3478
      - TURN_EXTERNAL_IP=${TURN_EXTERNAL_IP:-}
      - TURN_USERS=${TURN_USERS:-}
    ports:
      - '3478:3478'
      - '3478:3478/udp'
    command: ['--no-stdout-log']

  app:
    build: .
    restart: unless-stopped
    command: node index.js
    environment:
      - NODE_ENV=production
      - PORT=3000
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-chat_app}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SOCKET_IO_CORS_ORIGIN=${SOCKET_IO_CORS_ORIGIN:-http://localhost:3000}
      - TRUST_PROXY=1
      - SOCKET_IO_ADAPTER=${SOCKET_IO_ADAPTER:-redis}
    ports:
      - '3000:3000'
    depends_on:
      - postgres
      - redis

  worker:
    build: .
    restart: unless-stopped
    command: npm run worker
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - NODE_ENV=production
    depends_on:
      - postgres
      - redis

volumes:
  postgres-data:
    driver: local
